# .github/workflows/deploy.yml
#
# WHAT THIS DOES
# --------------
# Runs automatically every time you push code to GitHub.
#
# On EVERY push (any branch):
#   - Installs Python dependencies
#   - Runs a quick smoke test (imports work, env starts up)
#
# On push to MAIN branch only:
#   - Also triggers a Render re-deploy via webhook
#
# HOW TO READ THIS FILE
# ---------------------
# GitHub Actions uses YAML. The structure is:
#   name:     what this workflow is called
#   on:       when it runs (push, pull_request, etc.)
#   jobs:     what to do (a job is a group of steps)
#   steps:    individual commands to run

name: CI / Deploy

on:
  push:
    branches: ["**"] # run on every branch push
  pull_request:
    branches: [main] # run on PRs targeting main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test — runs on every push
  # ─────────────────────────────────────────────
  test:
    name: Smoke test
    runs-on: ubuntu-latest # GitHub provides this virtual machine for free

    steps:
      # 1. Download your code onto the virtual machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip packages (speeds up future runs significantly)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Verify imports work (catches broken dependencies early)
      - name: Verify Python imports
        run: |
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import fastapi; print('FastAPI: OK')"
          python -c "import stable_baselines3; print('SB3: OK')"
          python -c "import gymnasium; print('Gymnasium: OK')"
          python -c "from models.lstm.model import GlucoseLSTM; print('LSTM model: OK')"
          python -c "from models.rl.glucose_env import GlucoseEnv; print('RL env: OK')"

      # 6. Check that FastAPI app can be imported without errors
      - name: Verify FastAPI app loads
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from backend.app.schemas import PredictRequest, RecommendRequest
          print('Schemas: OK')
          from backend.app.services.predictor import GlucosePredictor
          print('Predictor service: OK')
          from backend.app.services.rl_agent import RLRecommender
          print('RL agent service: OK')
          "

  # ─────────────────────────────────────────────
  # Job 2: Deploy — only runs on push to main
  # and only if the test job passed
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test # only deploy if tests pass
    if: github.ref == 'refs/heads/main' # only on main branch

    steps:
      - name: Trigger Render deployment
        # Render provides a Deploy Hook URL — a URL you call to
        # trigger a re-deploy. We store it as a GitHub Secret
        # (never hardcode it — it's essentially a password).
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render deploy triggered"

#test
